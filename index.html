<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>COLETOR BRUMADO</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #ddd; }
        .box { background: #fff; padding: 15px; border: 1px solid #000; margin-bottom: 10px; }
        .hidden { display: none; }
        button { padding: 15px; cursor: pointer; font-weight: bold; width: 100%; margin: 5px 0; }
        .btn-tab { background: #eee; width: 48%; display: inline-block; }
        .active { background: #1b5e20; color: #fff; }
        input { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; }
    </style>
</head>
<body>

    <div style="text-align:center;">
        <button id="tab1" class="btn-tab active" onclick="ver('L')">LENHA</button>
        <button id="tab2" class="btn-tab" onclick="ver('T')">TORAS</button>
    </div>

    <div class="box">
        <button style="background:#444; color:#fff;" onclick="getLoc()">📍 CAPTURAR GPS</button>
        <div id="status">GPS: Aguardando...</div>
        <input type="hidden" id="lat"><input type="hidden" id="lon">
    </div>

    <div id="L">
        <div class="box">
            <h3>CADASTRO: LENHA</h3>
            <label>ID Leira:</label><input type="text" id="l_id">
            <label>Medidas (Larg x Alt x Comp):</label>
            <input type="number" id="l_l" placeholder="Largura">
            <input type="number" id="l_a" placeholder="Altura">
            <input type="number" id="l_c" placeholder="Comprimento">
            <button style="background:green; color:#fff;" onclick="add('L')">SALVAR DADOS</button>
        </div>
    </div>

    <div id="T" class="hidden">
        <div class="box">
            <h3>CADASTRO: TORAS</h3>
            <label>Nº Tora:</label><input type="text" id="t_id">
            <label>Espécie:</label><input type="text" id="t_sp">
            <label>Comp / D1 / D2:</label>
            <input type="number" id="t_c" placeholder="Comp">
            <input type="number" id="t_d1" placeholder="D1">
            <input type="number" id="t_d2" placeholder="D2">
            <button style="background:green; color:#fff;" onclick="add('T')">SALVAR DADOS</button>
        </div>
    </div>

    <button style="background:blue; color:#fff;" onclick="baixar()">📥 EXPORTAR CSV (EXCEL)</button>
    <button style="background:red; color:#fff; margin-top:50px;" onclick="limpar()">LIMPAR TUDO</button>

    <script>
        var banco = JSON.parse(localStorage.getItem('dados_v4')) || [];

        function ver(aba) {
            if(aba == 'L') {
                document.getElementById('L').className = '';
                document.getElementById('T').className = 'hidden';
                document.getElementById('tab1').className = 'btn-tab active';
                document.getElementById('tab2').className = 'btn-tab';
            } else {
                document.getElementById('L').className = 'hidden';
                document.getElementById('T').className = '';
                document.getElementById('tab1').className = 'btn-tab';
                document.getElementById('tab2').className = 'btn-tab active';
            }
        }

        function getLoc() {
            navigator.geolocation.getCurrentPosition(function(p) {
                document.getElementById('lat').value = p.coords.latitude;
                document.getElementById('lon').value = p.coords.longitude;
                document.getElementById('status').innerText = "📍 LOCALIZADO!";
            }, function(e) { alert("ERRO: Ative o GPS!"); });
        }

        function add(tipo) {
            var obj = { 
                tipo: tipo, 
                lat: document.getElementById('lat').value, 
                lon: document.getElementById('lon').value 
            };
            if(tipo == 'L') {
                obj.id = document.getElementById('l_id').value;
                var volSt = document.getElementById('l_l').value * document.getElementById('l_a').value * document.getElementById('l_c').value;
                obj.v = (volSt / 1.5).toFixed(3);
            } else {
                obj.id = document.getElementById('t_id').value;
                var d1 = document.getElementById('t_d1').value;
                var d2 = document.getElementById('t_d2').value;
                var c = document.getElementById('t_c').value;
                var a1 = 3.14159 * Math.pow(d1/2, 2);
                var a2 = 3.14159 * Math.pow(d2/2, 2);
                obj.v = (((a1+a2)/2) * c).toFixed(4);
            }
            banco.push(obj);
            localStorage.setItem('dados_v4', JSON.stringify(banco));
            alert("Salvo!");
        }

        function baixar() {
            var csv = "TIPO;ID;LAT;LON;VOL_M3\n";
            for(var i=0; i<banco.length; i++) {
                csv += banco[i].tipo + ";" + banco[i].id + ";" + banco[i].lat + ";" + banco[i].lon + ";" + banco[i].v + "\n";
            }
            var blob = new Blob(["\ufeff", csv], {type: 'text/csv'});
            var a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "coleta.csv";
            a.click();
        }

        function limpar() {
            if(confirm("Apagar tudo?")) { localStorage.clear(); location.reload(); }
        }
    </script>
</body>
</html>
