<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COLETOR FLORESTAL BA</title>
    <style>
        :root { --p: #2e7d32; --s: #1565c0; }
        body { font-family: sans-serif; background: #121212; color: #fff; margin: 0; padding: 10px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .tab { flex: 1; padding: 22px; font-size: 1.1em; font-weight: bold; border: none; border-radius: 12px; background: #333; color: #fff; }
        .active { background: var(--p) !important; border: 2px solid #fff; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #333; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #81c784; font-size: 0.9em; }
        input, select { width: 100%; padding: 18px; margin-bottom: 15px; border-radius: 10px; border: none; font-size: 18px; background: #eee; color: #000; box-sizing: border-box; }
        .btn-g { width: 100%; padding: 25px; border: none; border-radius: 15px; font-size: 1.3em; font-weight: bold; color: white; cursor: pointer; }
        .btn-gps { background: #455a64; margin-bottom: 10px; border: 1px solid #fff; }
        .btn-save { background: var(--p); }
        .btn-exp { background: var(--s); margin-top: 30px; }
        .status-gps { text-align: center; font-size: 1.1em; margin: 10px 0; color: #ffeb3b; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="tabs">
        <button id="tL" class="tab active" onclick="tab('L')">LENHA</button>
        <button id="tT" class="tab" onclick="tab('T')">TORAS</button>
    </div>

    <div class="card">
        <button class="btn-g btn-gps" onclick="getGPS()">📍 CAPTURAR COORDENADA UTM</button>
        <div id="gps-st" class="status-gps">Aguardando sinal...</div>
        <input type="hidden" id="utme"><input type="hidden" id="utmn"><input type="hidden" id="fuso">
    </div>

    <div id="boxL">
        <div class="card">
            <label>Nº DA LEIRA</label>
            <input type="text" id="l_id" placeholder="Ex: L-001">
            <label>DIMENSÕES (L x A x C)</label>
            <div style="display:flex; gap:5px;">
                <input type="number" id="l_l" placeholder="Larg">
                <input type="number" id="l_a" placeholder="Alt">
                <input type="number" id="l_c" placeholder="Comp">
            </div>
            <button class="btn-g btn-save" onclick="salvar('L')">SALVAR E LIMPAR</button>
        </div>
    </div>

    <div id="boxT" class="hidden">
        <div class="card">
            <label>Nº DA TORA / ESPÉCIE</label>
            <div style="display:flex; gap:5px;">
                <input type="text" id="t_id" placeholder="Nº">
                <input type="text" id="t_sp" placeholder="Espécie">
            </div>
            <label>ESPÉCIE PROTEGIDA?</label>
            <select id="t_prot">
                <option value="NÃO">NÃO</option>
                <option value="SIM">SIM</option>
            </select>
            <label>COMP / D1 / D2 (m)</label>
            <div style="display:flex; gap:5px;">
                <input type="number" id="t_c" placeholder="C">
                <input type="number" id="t_d1" placeholder="D1">
                <input type="number" id="t_d2" placeholder="D2">
            </div>
            <button class="btn-g btn-save" onclick="salvar('T')">SALVAR E LIMPAR</button>
        </div>
    </div>

    <button class="btn-g btn-exp" onclick="exportar()">📥 EXPORTAR CSV PARA EXCEL</button>
    <button style="background:none; color:#666; border:none; width:100%; margin-top:50px; font-size:10px" onclick="limpar()">LIMPAR MEMÓRIA DO APP</button>

<script>
    var db = JSON.parse(localStorage.getItem('coleta_ba_v7')) || [];

    function tab(a) {
        document.getElementById('boxL').className = (a=='L'?'':'hidden');
        document.getElementById('boxT').className = (a=='T'?'':'hidden');
        document.getElementById('tL').className = (a=='L'?'tab active':'tab');
        document.getElementById('tT').className = (a=='T'?'tab active':'tab');
    }

    // Conversor UTM Dinâmico (Detecta Fuso 23 ou 24)
    function toUTM(lat, lon) {
        var fuso = Math.floor((lon + 180) / 6) + 1;
        var sa = 6378137.0; var sb = 6356752.3142;
        var e2 = (Math.pow(sa, 2) - Math.pow(sb, 2)) / Math.pow(sa, 2);
        var e2c = (e2 / (1 - e2));
        var latR = lat * Math.PI / 180;
        var lonR = lon * Math.PI / 180;
        var lon0 = ((fuso * 6) - 183) * Math.PI / 180;
        var N = sa / Math.sqrt(1 - e2 * Math.pow(Math.sin(latR), 2));
        var T = Math.pow(Math.tan(latR), 2);
        var C = e2c * Math.pow(Math.cos(latR), 2);
        var A = Math.cos(latR) * (lonR - lon0);
        var M = sa * ((1 - e2 / 4 - 3 * Math.pow(e2, 2) / 64) * latR - (3 * e2 / 8 + 3 * Math.pow(e2, 2) / 32) * Math.sin(2 * latR) + (15 * Math.pow(e2, 2) / 256) * Math.sin(4 * latR));
        var x = 0.9996 * N * (A + (1 - T + C) * Math.pow(A, 3) / 6 + (5 - 18 * T + Math.pow(T, 2) + 72 * C) * Math.pow(A, 5) / 120) + 500000;
        var y = 0.9996 * (M + N * Math.tan(latR) * (Math.pow(A, 2) / 2 + (5 - T + 9 * C + 4 * Math.pow(C, 2)) * Math.pow(A, 4) / 24 + (61 - 58 * T + Math.pow(T, 2) + 600 * C) * Math.pow(A, 6) / 720));
        if (y < 0) y += 10000000;
        return {e: x.toFixed(2), n: y.toFixed(2), f: fuso + "S"};
    }

    function getGPS() {
        document.getElementById('gps-st').innerText = "Buscando satélites...";
        navigator.geolocation.getCurrentPosition(function(p) {
            var utm = toUTM(p.coords.latitude, p.coords.longitude);
            document.getElementById('utme').value = utm.e;
            document.getElementById('utmn').value = utm.n;
            document.getElementById('fuso').value = utm.f;
            document.getElementById('gps-st').innerText = "📍 Fuso " + utm.f + " | E: " + utm.e;
        }, function(e) { alert("ERRO: Ative o GPS do celular!"); }, {enableHighAccuracy: true});
    }

    function salvar(tipo) {
        if(!document.getElementById('utme').value) return alert("Clique em CAPTURAR COORDENADA antes de salvar!");
        
        var item = {
            tipo: tipo, e: document.getElementById('utme').value, n: document.getElementById('utmn').value,
            fuso: document.getElementById('fuso').value, hora: new Date().toLocaleString()
        };

        if(tipo == 'L') {
            item.id = document.getElementById('l_id').value;
            var volSt = document.getElementById('l_l').value * document.getElementById('l_a').value * document.getElementById('l_c').value;
            item.vol = (volSt / 1.5).toFixed(3);
            // Limpa Lenha
            document.getElementById('l_id').value=''; document.getElementById('l_l').value=''; document.getElementById('l_a').value=''; document.getElementById('l_c').value='';
        } else {
            item.id = document.getElementById('t_id').value;
            item.sp = document.getElementById('t_sp').value;
            item.prot = document.getElementById('t_prot').value;
            var d1 = document.getElementById('t_d1').value; var d2 = document.getElementById('t_d2').value; var c = document.getElementById('t_c').value;
            var a1 = Math.PI * Math.pow(d1/2, 2); var a2 = Math.PI * Math.pow(d2/2, 2);
            item.vol = (((a1+a2)/2) * c).toFixed(4);
            // Limpa Toras
            document.getElementById('t_id').value=''; document.getElementById('t_sp').value=''; document.getElementById('t_c').value=''; document.getElementById('t_d1').value=''; document.getElementById('t_d2').value='';
        }

        db.push(item);
        localStorage.setItem('coleta_ba_v7', JSON.stringify(db));
        document.getElementById('utme').value = ''; document.getElementById('gps-st').innerText = "Salvo! Pegue o próximo ponto.";
        alert("REGISTRO SALVO!");
    }

    function exportar() {
        var csv = "TIPO;ID;ESPECIE;PROTEGIDA;FUSO;UTM_E;UTM_N;DATA_HORA;VOLUME_M3\n";
        db.forEach(function(i){
            csv += i.tipo+";"+(i.id||'')+";"+(i.sp||'')+";"+(i.prot||'')+";"+i.fuso+";"+i.e+";"+i.n+";"+i.hora+";"+i.vol+"\n";
        });
        var blob = new Blob(["\ufeff", csv], {type: 'text/csv'});
        var a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "coleta_bahia.csv";
        a.click();
    }

    function limpar() { if(confirm("Apagar todos os dados salvos?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
